- name: "Configure the physical Kubernetes cluster nodes"
  hosts: physical_k8s_cluster_nodes
  tasks:
    - name: "Configure physical k8s cluster node"
      include_role:
        name: configure-physical-k8s-cluster-node

- name: "Install required kubernetes componentes"
  hosts: localhost
  gather_facts: no
  tasks:
    - include_vars: ../variables.yaml
    - include_vars: ../secrets.enc

    - name: "Install kubernetes python package"
      pip:
        name: kubernetes
        state: present

    - name: "Ensure ~/tmp-ansible exists for deployment files"
      file:
        path: "~/tmp-ansible"
        state: directory

    - name: "Wait until Kubernetes cluster is up and running again (in case of reboot)"
      command: kubectl get nodes --no-headers
      register: kubernetes_nodes_final
      until: "'NotReady' not in kubernetes_nodes_final.stdout and 'Error from server' not in kubernetes_nodes_final.stderr"
      retries: 30
      delay: 20

    - name: "Install longhorn"
      include_role:
        name: k8s-install-longhorn

    - name: "Install KubeVirt"
      include_role:
        name: k8s-install-kubevirt

    - name: "Install private container registry"
      include_role:
        name: k8s-install-private-container-registry

    - name: "Install logging logging stack"
      include_role:
        name: k8s-install-logging-stack

    - name: "Install mitmproxy"
      include_role:
        name: k8s-install-mitmproxy
      when: corporate_ca_cert_path is defined and corporate_ca_cert_path | length > 0

    - name: "Install the in-cluster CI binary cache (kubectl/virtctl/logcli served over HTTP)"
      include_role:
        name: k8s-install-ci-binary-cache

- name: "Configure the physical Kubernetes cluster nodes to accept the container registry"
  hosts: physical_k8s_cluster_nodes
  tasks:
    - name: Configure k3s to use the private registry
      become: yes
      copy:
        dest: /etc/rancher/k3s/registries.yaml
        content: |
          mirrors:
            "container-registry.local:5000":
              endpoint:
                - "http://localhost:32000"

    - name: Restart k3s service
      become: yes
      systemd:
        name: k3s
        state: restarted

- name: "Deploy overlayfs cleanup cron job on k3s nodes"
  hosts: physical_k8s_cluster_nodes
  tasks:
    - name: "Deploy cron job to prune unused container images"
      become: yes
      cron:
        name: "k3s crictl image prune"
        minute: "0"
        hour: "3"
        job: "k3s crictl rmi --prune >> /var/log/k3s-image-cleanup.log 2>&1"

- name: "Install kpd"
  hosts: localhost
  gather_facts: no
  tasks:
    - include_vars: ../variables.yaml
    - include_vars: ../secrets.enc

    - name: "Install kernel-patches-daemon"
      include_role:
        name: k8s-install-kernel-patches-daemon
      when: kpd_github_app_id is defined

