#TODO: Make VM resources configurable via vars_prompt
- name: "Create a kubevirt-actions-runner scale set to spawn KubeVirt VMs on demand from a GitHub workflow"
  hosts: localhost
  gather_facts: no
  vars_prompt:
    - name: runner_set_name
      prompt: Suffix of the GitHub runner set
      private: false
    - name: github_config_url
      prompt: GitHub repo URL that the runner set should serve
      private: false
    - name: arc_github_app_id
      prompt: "GitHub App ID (optional - PAT or APP) (or leave ALL auth fields empty to reuse existing secret)"
      default: ""
      private: false
    - name: arc_github_app_installation_id
      prompt: "GitHub App Installation ID (optional - PAT or APP) (or leave ALL auth fields empty to reuse existing secret)"
      default: ""
      private: false
    - name: arc_github_app_private_key_path
      prompt: "Path to GitHub App private key .pem file (optional - PAT or APP) (or leave ALL auth fields empty to reuse existing secret)"
      default: ""
      private: false
    - name: github_token
      prompt: "GitHub PAT (optional - PAT or APP) (or leave ALL auth fields empty to reuse existing secret)"
      default: ""
      private: false
  tasks:
    - name: "Install the kernel builder cron job for building nightly kernels"
      include_role:
        name: kernel-builder-k8s-job

    - name: "Install kubevirt-actions-runner scale set and its dependencies"
      include_role:
        name: k8s-install-kubevirt-actions-runner-controller
