name: "KubeVirt action"
description: "Spwaning a KubeVirt VM in your k8s cluster via ARC"
author: "Dennis Maisenbacher"
inputs:
  kernel_version:
    description: "Linux kernel version the VM should boot. If omitted, the VM boots the cloud-image's default kernel (no custom kernel or modules are loaded)."
    required: false
    default: ""
  run_cmds:
    description: "Commands that should be executed within the VM"
    required: true
  vm_artifact_upload_dir:
    description: "VM directory of artifacts to upload"
    required: false
  host_devices:
    description: "Comma-separated list of host device short names to attach to the VM (e.g. nvme-wdc-zn540,nvme-wdc-zn540,nvme-wdc-sn640). Duplicates request multiple devices of the same type."
    required: false
    default: ""
  container_disk_image:
    description: "Container disk image backing the VM's root volume. If omitted, defaults to the pinned Fedora cloud image from the VM template."
    required: false
    default: ""

outputs:
  stdout:
    description: "stdout of the run_cmds"
    value: "${{ steps.run.outputs.stdout }}"

runs:
  using: "composite"
  steps:
    - name: Set GitHub Path
      run: echo "$GITHUB_ACTION_PATH" >> $GITHUB_PATH
      shell: bash
      env:
        GITHUB_ACTION_PATH: "${{ github.action_path }}"
    - name: Install required tools
      run: ${GITHUB_ACTION_PATH}/entrypoint.sh install_requirements
      shell: bash
      env:
        GITHUB_ACTION_PATH: "${{ github.action_path }}"
    - id: run
      name: Run cmds in VM
      run: ${GITHUB_ACTION_PATH}/entrypoint.sh run_ssh_cmds
      shell: bash
      env:
        GITHUB_ACTION_PATH: "${{ github.action_path }}"
        INPUT_KERNEL_VERSION: "${{ inputs.kernel_version }}"
        INPUT_RUN_CMDS: "${{ inputs.run_cmds }}"
        INPUT_HOST_DEVICES: "${{ inputs.host_devices }}"
        INPUT_CONTAINER_DISK_IMAGE: "${{ inputs.container_disk_image }}"
    - name: Create timestamp env var for artifact uploads
      shell: bash
      run: |
        ts=$(date +'%Y%m%d-%H%M%S')
        echo "TS=$ts" >> $GITHUB_ENV
      if: ${{ always() }}
    - name: Extract test artifacts for upload
      id: extract_artifact
      run: ${GITHUB_ACTION_PATH}/entrypoint.sh extract_test_artifacts_for_upload "${{ inputs.vm_artifact_upload_dir }}"
      shell: bash
      env:
        GITHUB_ACTION_PATH: "${{ github.action_path }}"
      if: ${{ always() && inputs.vm_artifact_upload_dir != '' }}
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: artifact-${{ env.TS }}
        path: |
          ./artifacts
      if: ${{ always() && steps.extract_artifact.outcome == 'success' }}
    - name: Extract dmesg logs from VM
      id: extract_dmesg
      run: ${GITHUB_ACTION_PATH}/entrypoint.sh extract_dmesg_logs
      shell: bash
      env:
        GITHUB_ACTION_PATH: "${{ github.action_path }}"
      if: ${{ always() }}
    - name: Upload dmesg logs
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: "dmesg-logs-${{ env.TS }}"
        path: |
          ./dmesg-logs
      if: ${{ always() && steps.extract_dmesg.outcome == 'success' }}
    - name: Unpack kernel artifacts from VM to runner pod
      id: unpack
      continue-on-error: true
      run: ${GITHUB_ACTION_PATH}/entrypoint.sh extract_kernel_artifacts
      shell: bash
      env:
        GITHUB_ACTION_PATH: "${{ github.action_path }}"
        INPUT_KERNEL_VERSION: "${{ inputs.kernel_version }}"
      if: ${{ always() }}
    - name: Upload kernel artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: "kernel-artifact-${{ inputs.kernel_version }}-${{ env.TS }}"
        path: |
          ~/kernel-artifacts
      if: ${{ always() && steps.unpack.outcome == 'success' }}
    - name: VM cleanup
      shell: bash
      run: ${GITHUB_ACTION_PATH}/entrypoint.sh cleanup_vm
      env:
        GITHUB_ACTION_PATH: "${{ github.action_path }}"
      if: ${{ always() }}

branding:
  icon: "monitor"
  color: "gray-dark"
