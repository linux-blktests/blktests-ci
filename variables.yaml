#Longhorn
longhorn_helm_chart_url: "https://charts.longhorn.io"
longhorn_version: "1.11.0"
# The external snapshotter version depends on the longhorn version.
# See: https://longhorn.io/docs/1.11.0/snapshots-and-backups/csi-snapshot-support/enable-csi-snapshot-support/
longhorn_external_snapshotter_version: "v8.4.0"

#rook-ceph
rook_ceph_version: "v1.16.4"
rook_ceph_repo: "https://github.com/rook/rook.git"

#prometheus
prometheus_helm_chart_url: "https://prometheus-community.github.io/helm-charts"

# logcli (Grafana Loki CLI)
logcli_version: "v3.6.2"

#KubeVirt
kubevirt_version: "v1.7.0"
kubevirt_cri_version: "v1.64.0"

#gha-runner-scale-set
gha_rss_version: "0.14.1"

#gitlab-runner
# Optional: GitLab Runner support, deployed in parallel to the GitHub ARC path
# via playbooks/setup-gitlab-runner-scale-set.yaml. Nothing here is used unless
# that playbook is run; the GitHub path is unaffected.
gitlab_runner_helm_chart_url: "https://charts.gitlab.io"
gitlab_runner_version: "0.89.1"
# Global number of concurrent CI job pods this runner manager may schedule.
gitlab_runner_concurrent: 3
# The kubevirt runner image is built from this repository and pushed to the
# local registry by the gitlab-runner role. It is referenced through the k3s
# registry mirror so kubelet can pull it on the cluster nodes.
kubevirt_runner_image: "container-registry.local:5000/kubevirt-runner:latest"

#ci-binary-cache
# In-cluster HTTP cache that serves version-matched kubectl/virtctl/logcli to
# the GitHub ARC and GitLab kubevirt runners, so CI jobs fetch them from the
# LAN instead of the internet. A CronJob reconciles the binaries against the
# live cluster on the schedule below.
ci_tools_namespace: "ci-tools"
ci_bin_cache_storage_class: "longhorn"
ci_bin_cache_size: "2Gi"
ci_bin_cache_schedule: "0 * * * *"

#mitmproxy
# Optional: Set corporate_ca_cert_path to the path of your corporate SSL MITM
# certificate PEM file to deploy mitmproxy in the cluster. When set, mitmproxy
# is deployed and all ARC runners and KubeVirt VMs route traffic through it.
# corporate_ca_cert_path: "/path/to/corporate-ca.pem"
mitmproxy_version: "11.1.3"

#private_container_registry
private_container_registry_size: "800Gi"

#kernel-patches-daemon (kpd)
# Optional: kpd is only deployed when kpd_github_app_id is defined in
# secrets.enc. See the README for the full list of required secret variables.
kpd_image_repo: "https://github.com/linux-blktests/kernel-patches-daemon.git"
kpd_image_branch: "blktests"
kpd_target_repo: "https://github.com/linux-blktests/linux-block"
kpd_ci_repo: "https://github.com/linux-blktests/blktests-kpd-ci.git"
kpd_ci_branch: "main"
kpd_lock_repo: "linux-blktests/blktests-kpd-lock"
kpd_lock_ttl_seconds: 1200
kpd_heartbeat_interval_seconds: 300
kpd_cluster_name: "cluster-1"  # unique name per cluster, change for each deployment
# Set kpd_active to false to force this cluster into standby (manual override)
# kpd_active: false
# KPD Optional: Email notifications. Set kpd_smtp_host in secrets.enc to enable.
# kpd_smtp_port: 465
# kpd_smtp_tls: true
# kpd_smtp_to: []
# kpd_smtp_cc: []
# kpd_smtp_http_proxy: null
# kpd_smtp_submitter_allowlist: []
# kpd_smtp_ignore_allowlist: false

#The following vars are defined in `secrets.enc`:
#longhorn_ui_auth_user
#longhorn_ui_auth_password
#kpd_github_app_id              (optional, enables kpd deployment)
#kpd_github_app_installation_id (optional, enables kpd deployment)
#kpd_github_app_private_key     (optional, enables kpd deployment)
#kpd_patchwork_api_username      (optional, enables kpd deployment)
#kpd_patchwork_api_token         (optional, enables kpd deployment)
#kpd_smtp_host                   (optional, enables kpd email notifications)
#kpd_smtp_from                   (optional, required when kpd_smtp_host is set)
#kpd_smtp_user                   (optional, SMTP auth username)
#kpd_smtp_pass                   (optional, SMTP auth password)
